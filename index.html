<script>
function updateTime(){
    function add0(s){
        return String(s).padStart(2, '0');
    }
    const date = new Date();
    document.getElementById("time").innerText = `${date.getFullYear()}-${add0(date.getMonth() + 1)}-${add0(date.getDate())} ${add0(date.getHours())}:${add0(date.getMinutes())}:${add0(date.getSeconds())}`;
}
updateTime();setInterval(updateTime,1000);


const INIT_DATA = {AWM: 250, Lemon: 300, GaoHanTu: 200, Utw: 800, Fafat: 250, COHL: 300, UWSF: 250, Vial: 250, SOTL: 350, Oganesson: 300};
const COMPANIES = Object.keys(INIT_DATA);
const INIT_VALUES = Object.values(INIT_DATA);

if(localStorage.data == undefined){
    localStorage.data = JSON.stringify(INIT_VALUES);
}
let data = JSON.parse(localStorage.data);
const chart = echarts.init(document.getElementById('chart'));
const option = {
    title: {text: '当前所有虚拟公司市值'},
    xAxis: {
        type: 'category',
        data: COMPANIES,
        axisLabel: {interval: 0}
    },
    yAxis: {type: 'value'},
    series: [{
        name: '市值',
        type: 'bar',
        data: data,
        itemStyle: {color: '#3198d9'}
    }],
    label: {show: true, position: 'top'}
};
chart.setOption(option);
window.addEventListener('resize', () => chart.resize());

    
function randomChange() {
    return Math.floor(Math.random() * 5);
}
setInterval(function(){
    for(let i=0; i<data.length; i++){
        if (data[i] === 1) {
            data[i] += randomChange();
        } else {
            const change = randomChange();
            data[i] = Math.max(1, data[i] + (Math.random() > 0.5 ? change : -change));
        }
    }
    localStorage.data = JSON.stringify(data);
    chart.setOption({series: [{name: '市值', data: data}]});
},1000)

if(localStorage.money == undefined){
    localStorage.money = 80;
}
let money = localStorage.money;
document.getElementById('money').innerText = money;

function buy(){
    if(localStorage.myStocks == undefined){
        localStorage.myStocks = JSON.stringify([]);
    }
    let myStocks = JSON.parse(localStorage.myStocks);
    let company = COMPANIES[select.value];
    let curr = data[select.value];
    let pay = document.getElementById('pay').value;
    money -= pay; localStorage.money = money;
    document.getElementById('money').innerText = money;
    myStocks.push({company: company, pay: pay, curr: curr});
    localStorage.myStocks = JSON.stringify([myStocks]);
    alert(`已成功购买 ${company} 共 ${pay} Fafat 币，当前市值为 ${curr}`);
}

}
