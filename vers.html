<script>
function updateTime(){
    function add0(s){
        return String(s).padStart(2, '0');
    }
    const date = new Date();
    document.getElementById("time").innerText = `${date.getFullYear()}-${add0(date.getMonth() + 1)}-${add0(date.getDate())} ${add0(date.getHours())}:${add0(date.getMinutes())}:${add0(date.getSeconds())}`;
}
updateTime();setInterval(updateTime,1000);
</script>
